<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOVE E-SCHOOL</title>
<link rel="stylesheet" href="st.css">
</head>
<body>
  <div id="loader">
    <div class="loader-box">
      <h2>JOVE E-SCHOOL</h2>
      <div class="progress-bar">
        <div id="progress"></div>
      </div>
      <p id="percent">0%</p>
    </div>
  </div>

<header>
<h1>JOVE E-SCHOOL</h1>
<p>Smart Digital Learning Platform</p>
</header>

<div class="home">
    <h1>Welcome to JOVE E-SCHOOL</h1>

    <p class="tagline">
        Learn smarter. Grow faster.
    </p>

    <div class="features">

    <button
        class="green"
        onclick="adminLogin()">
        Admin
    </button>

    <button
        class="green"
        onclick="teacherLogin()">
        Teacher
    </button>

    <button
        class="green"
        onclick="studentLogin()">
        Student
    </button>

</div>

<button
    class="blue signup-btn"
    onclick="window.location.href='register.html'">
    Sign Up
</button>

<script src="app.js"></script>
</body>
</html>
