<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Message</title>
<link rel="stylesheet" href="st.css">
</head>
<body>

<header>
    <h2>📨 Send Message</h2>
</header>

<div class="card">

    <label>Send To</label>

    <select id="messageRole">

        <option value="teacher">
            Teachers
        </option>

        <option value="student">
            Students
        </option>

        <option value="admin">
            Admin
        </option>

    </select>

    <br><br>

    <label>Message</label>

    <textarea
        id="messageText"
        rows="6"
        placeholder="Type your message here..."
    ></textarea>

    <br><br>

    <button
        class="green"
        onclick="sendMessage()">
        Send Message
    </button>

</div>

<button
    class="green"
    onclick="history.back()">
    ← Back
</button>

<script src="app.js"></script>
<script>
   

</script>
</body>
</html>
